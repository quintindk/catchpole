services:
  postgres:
    image: postgres:16-alpine
    container_name: catchpole-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${LITELLM_DB_USER:-litellm}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD:-litellm-dev}
      POSTGRES_DB: ${LITELLM_DB_NAME:-litellm}
      PGPORT: ${LITELLM_DB_PORT:-5433}
    volumes:
      - catchpole-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LITELLM_DB_USER:-litellm} -p ${LITELLM_DB_PORT:-5433}"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    container_name: catchpole-litellm
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "--config"
      - "/app/config/litellm_config.yaml"
      - "--port"
      - "4000"
      - "--host"
      - "0.0.0.0"
    working_dir: /app
    env_file:
      - .env
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-catchpole-dev}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-catchpole-salt-change-me}
      DATABASE_URL: postgresql://${LITELLM_DB_USER:-litellm}:${LITELLM_DB_PASSWORD:-litellm-dev}@localhost:${LITELLM_DB_PORT:-5433}/${LITELLM_DB_NAME:-litellm}
      STORE_MODEL_IN_DB: "True"
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-admin}
      GITHUB_COPILOT_TOKEN_DIR: /app/copilot-auth
      PYTHONPATH: /app/config
      # LM Studio runs on the host; with network_mode: host (Linux) or
      # mirrored WSL networking, localhost works directly.
      CATCHPOLE_LOCAL_API_BASE: ${CATCHPOLE_LOCAL_API_BASE:-http://localhost:1234/v1}
      CATCHPOLE_LOCAL_API_KEY: ${LM_STUDIO_API_KEY}
      CATCHPOLE_LOCAL_MODEL: ${CATCHPOLE_LOCAL_MODEL:-openai/google/gemma-4-26b-a4b}
      CATCHPOLE_CLOUD_MODEL: ${CATCHPOLE_CLOUD_MODEL:-github_copilot/claude-sonnet-4.6}
      LM_STUDIO_API_BASE: ${LM_STUDIO_API_BASE:-http://localhost:1234/v1}
    volumes:
      - ./litellm_config.yaml:/app/config/litellm_config.yaml:ro
      - ./catchpole.py:/app/config/catchpole.py:ro
      - copilot-auth:/app/copilot-auth
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  copilot-auth:
    external: true
  catchpole-postgres:
